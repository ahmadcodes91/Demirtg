<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Real Estate</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* HERO */
#hero{
height:100vh;
background:url('images/hero.jpg') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

#hero::after{
content:'';
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

#hero h1{
position:relative;
font-size:40px;
z-index:2;
}

/* FILTER */
.filter{
text-align:center;
margin:20px;
}

.filter button{
margin:5px;
padding:10px 20px;
border:none;
cursor:pointer;
background:gold;
}

/* PROPERTY */
.container{
display:flex;
overflow-x:auto;
gap:20px;
padding:20px;
}

.property{
min-width:300px;
background:#111;
border-radius:10px;
overflow:hidden;
transition:0.4s;
cursor:pointer;
}

.property:hover{
transform:scale(1.05);
}

.property img{
width:100%;
height:200px;
object-fit:cover;
}

.property h3{
padding:10px;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

#modal img{
width:90%;
max-width:500px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:white;
font-size:20px;
text-decoration:none;
}

</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
<h1>Find Your Dream Property</h1>
</section>

<!-- FILTER -->
<div class="filter">
<button onclick="filterProperty('all')">All</button>
<button onclick="filterProperty('buy')">Buy</button>
<button onclick="filterProperty('rent')">Rent</button>
</div>

<!-- PROPERTIES -->
<div class="container" id="slider">

<div class="property" data-type="buy" onclick="openModal('images/property1.jpg')">
<img src="images/property1.jpg">
<h3>Luxury Apartment</h3>
</div>

<div class="property" data-type="rent" onclick="openModal('images/property2.jpg')">
<img src="images/property2.jpg">
<h3>Modern Villa</h3>
</div>

<div class="property" data-type="buy" onclick="openModal('images/property3.jpg')">
<img src="images/property3.jpg">
<h3>Premium House</h3>
</div>

<div class="property" data-type="rent" onclick="openModal('images/property4.jpg')">
<img src="images/property4.jpg">
<h3>Studio Apartment</h3>
</div>

</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
<span class="close">&times;</span>
<img id="modalImg">
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/91XXXXXXXXXX" class="whatsapp">💬</a>

<script>

/* AUTO SLIDER */
let slider=document.getElementById("slider");
setInterval(()=>{
slider.scrollBy({left:300,behavior:'smooth'});
},3000);

/* FILTER */
function filterProperty(type){
let cards=document.querySelectorAll(".property");
cards.forEach(card=>{
if(type==="all" || card.dataset.type===type){
card.style.display="block";
}else{
card.style.display="none";
}
});
}

/* MODAL */
function openModal(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
